<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suunto 训练日历原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage-shell">
      <section class="stage-header">
        <p class="stage-kicker">SUUNTO APP 模块原型</p>
        <h1>训练日历</h1>
        <p class="stage-copy">
          以一个日历承载用户的过去记录、今天待做和未来训练计划。
        </p>
        <div class="stage-tags">
          <span>中文内容</span>
          <span>训练导向</span>
          <span>参考现有日历风格</span>
        </div>
      </section>

      <section class="device-stage">
        <div class="phone-frame">
          <div class="phone-topbar">
            <span>14:27</span>
            <span>日历</span>
            <span>80%</span>
          </div>
          <div id="app"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
